<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Insert at End — Singly Linked List</title>
  <link rel="stylesheet" href="insert-end.css" />
</head>
<body>
  <div class="page">
    <header class="top-bar">
      <div class="title-group">
        <span class="icon">🔗</span>
        <span class="title">Singly Linked List — Insert at End</span>
      </div>
      <div class="step-badge" id="stepBadge">Step 0 / 4</div>
    </header>

    <div class="code-panel">
      <div class="code-line" id="code0">// Initial State: 1 → 2 → 3 → 4 → NULL</div>
      <div class="code-line" id="code1">Node* newNode = new Node(value);</div>
      <div class="code-line" id="code2">tail-&gt;next = newNode;</div>
      <div class="code-line" id="code3">tail = newNode;</div>
      <div class="code-line" id="code4">// List rearranged: 1 → 2 → 3 → 4 → 0 → NULL</div>
    </div>

    <div class="stage" id="stage">
      <!-- SVG overlay for animated arrow -->
      <svg id="arrowSvg" class="arrow-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7"
                  refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00c8ff"/>
          </marker>
        </defs>
        <path id="animPath" class="anim-path" fill="none"
              stroke="#00c8ff" stroke-width="2.5"
              marker-end="url(#arrowhead)" stroke-dasharray="0" stroke-dashoffset="0"/>
      </svg>

      <!-- Main list row -->
      <div class="list-row" id="listRow">
        <!-- nodes injected by JS -->
      </div>

      <!-- New node area -->
      <div class="new-node-area" id="newNodeArea">
        <div class="node-box new-node" id="newNode">
          <div class="node-data">0</div>
          <div class="node-next" id="newNodeNext">NULL</div>
        </div>
        <div class="node-addr" id="newNodeAddr">0x100</div>
        <div class="node-label">newNode</div>
      </div>
    </div>

    <div class="desc-panel" id="descPanel">
      <span id="descText">Initial linked list with 4 nodes. Tail points to node 4.</span>
    </div>

    <div class="controls">
      <button class="btn btn-reset" id="btnReset">↺ Reset</button>
      <button class="btn btn-prev" id="btnPrev">‹ Prev</button>
      <button class="btn btn-play" id="btnPlay">▶ Play</button>
      <button class="btn btn-next" id="btnNext">Next ›</button>
    </div>

    <div class="dots" id="dots">
      <span class="dot active" data-i="0"></span>
      <span class="dot" data-i="1"></span>
      <span class="dot" data-i="2"></span>
      <span class="dot" data-i="3"></span>
      <span class="dot" data-i="4"></span>
    </div>
  </div>

<link rel="stylesheet" href="insert-end-test.css">
<script src="insert-end-test.js"></script>
</body>
</html>
