<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iDS Studio Next — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="login.css" />

  <style>
    /* ── Loading spinner ── */
    .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Wake-up notice ── */
    .wake-notice {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: #eff4ff;
      border: 1px solid #c7d8ff;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #3b6cff;
      text-align: center;
      line-height: 1.5;
    }

    /* ── Error box ── */
    .error-box {
      display: none;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #be123c;
    }
  </style>
</head>

<body>

  <div class="page-wrapper">

    <!-- Logo & Title -->
    <div class="brand">
      <div class="logo-icon">
        <img
          src="../image/ilogo.png"
          alt="iDS logo"
          class="logo-img"
          onerror="this.style.display='none'; this.parentElement.querySelector('.logo-fallback').style.display='flex';"
        />
        <span class="logo-fallback">iDS</span>
      </div>

      <h1 class="brand-name">iDS Studio <span class="brand-next">Next</span></h1>
      <p class="brand-subtitle">AI Powered Data Structure Learning</p>
    </div>

    <!-- Login Card -->
    <div class="card-wrapper">
      <div class="card-glow"></div>

      <div class="card">

        <div class="card-header">
          <h2 class="card-title">Welcome Back</h2>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm">

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>

          <!-- Inline Error Message Box -->
          <div id="errorBox" class="error-box"></div>

          <button class="btn-primary" type="submit" id="submitBtn">
            <span class="btn-spinner" id="btnSpinner"></span>
            <span id="btnText">Continue</span>
          </button>

          <!-- Wake-up notice (shown after 4s if server is cold-starting) -->
          <div class="wake-notice" id="wakeNotice">
            ⏳ Server is waking up, please wait a moment...
          </div>

        </form>

        <div class="card-links">
          <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
          <p><a href="#">Browse Public Sections</a></p>
        </div>

      </div>
    </div>

  </div>

  <!-- Login logic only — no script.js needed on this page -->
  <script src="login.js"></script>

</body>
</html>
